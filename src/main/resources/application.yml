spring:
  profiles:
    default: local
  application:
    name: alarmas
  main:
    time-zone: Europe/Madrid

server:
  port: 8084

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400

management:
  endpoints:
    web:
      exposure:
        include: health,info,loggers
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.apache.kafka.clients.consumer: INFO
    org.apache.kafka.clients.producer: INFO
    com.asistente.alarmas: INFO

# =========================
# PERFIL: LOCAL
# =========================
---
spring:
  config:
    activate:
      on-profile: local
  data:
    mongodb:
      uri: mongodb://localhost:27017/asistente_diario
  kafka:
    bootstrap-servers: 127.0.0.1:29092
    consumer:
      group-id: alarmas
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.asistente.*"
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        max.block.ms: 3000
        request.timeout.ms: 3000
        delivery.timeout.ms: 5000

# =========================
# PERFIL: DOCKER (en contenedores)
# =========================
---
spring:
  config:
    activate:
      on-profile: docker
  data:
    mongodb:
      uri: mongodb://mongo:27017/asistente_diario
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: alarmas
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.asistente.*"
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        max.block.ms: 3000
        request.timeout.ms: 3000
        delivery.timeout.ms: 5000
